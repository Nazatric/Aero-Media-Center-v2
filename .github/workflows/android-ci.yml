name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore (if configured)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/release.keystore"
            echo "Decoded release keystore."
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret set — release APK will be built unsigned."
          fi

      - name: Clean
        run: ./gradlew clean

      # Non-blocking: a lint warning or a flaky test shouldn't stop you from
      # getting an installable APK. The reports still upload below either way.
      - name: Lint
        run: ./gradlew lint --stacktrace || true

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace || true

      # These two are the ones allowed to actually fail the job — no APK
      # means nothing to install, which is the one thing that has to work.
      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Assemble release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && format('{0}/release.keystore', runner.temp) || '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify APKs were actually produced
        run: |
          set -e
          debug_apk=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          release_apk=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$debug_apk" ]; then echo "::error::No debug APK found"; exit 1; fi
          if [ -z "$release_apk" ]; then echo "::error::No release APK found"; exit 1; fi
          echo "debug:   $debug_apk"
          echo "release: $release_apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aeromedia-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: aeromedia-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
          retention-days: 7
          if-no-files-found: ignore
