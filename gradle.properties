# Tuned for GitHub's free hosted runners (~7GB RAM total). A Compose +
# Media3 + Room project this size will genuinely OOM during R8/dexing/Kotlin
# compilation with default settings. Lower heap + no parallel execution + no
# persistent Kotlin daemon trades a slightly slower build for one that
# actually finishes. Loosen these if you're building somewhere with more
# memory (a real dev machine, a self-hosted runner, etc).
org.gradle.jvmargs=-Xmx1536m -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.daemon=false
kotlin.compiler.execution.strategy=in-process

android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
